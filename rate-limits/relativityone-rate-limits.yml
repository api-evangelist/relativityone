specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: RelativityOne
providerId: relativityone
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - eDiscovery
  - Legal
description: RelativityOne REST API rate limits are documented inside the authenticated Relativity Community
  / developer documentation rather than on public marketing pages. They are tenant- and operation-specific
  (e.g. import, search, export) and are not published as a single per-second number.
sources:
  - https://www.relativity.com/
notes: Detailed per-endpoint rate-limit numbers live behind Relativity's authenticated documentation.
  Public reconciliation cannot be performed without tenant credentials.
limits:
  - name: Per-tenant API throttling
    scope: tenant
    metric: varies
    limit: 'see Relativity Community documentation (authenticated)'
policies:
  - name: Authenticated Documentation
    description: Rate-limit and throttling guidance for RelativityOne REST APIs is published in the
      Relativity Community / developer docs, accessible only to licensed tenants and partners.
  - name: Tenant Isolation
    description: Limits and concurrency caps are enforced per tenant instance; bursty operations such
      as bulk import or search may have separate concurrency rules from interactive APIs.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
