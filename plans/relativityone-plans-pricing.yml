description: RelativityOne is Relativity's SaaS eDiscovery platform. Relativity does not publish public
  list pricing for the platform or its REST APIs; commercial terms are negotiated per customer / matter
  and depend on data volume, user count, processing usage, and review hours. Developer access (REST APIs,
  Apps, Aero) is gated to authenticated tenants of a licensed RelativityOne instance.
sources:
  - https://www.relativity.com/
notes: No public per-tier pricing is published. Subscriptions are quoted by Relativity sales based on
  data volume and user count, then provisioned per tenant. Scaffold trimmed to one Contact Sales plan.
plans:
  - id: relativityone-contact-sales
    name: Contact Sales
    type: enterprise
    description: RelativityOne is sold via Relativity sales as a tenant subscription that includes platform
      access plus matter-driven processing/review usage.
    entries:
      - label: RelativityOne Subscription
        name: relativityone_subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: RelativityOne Tenant
      - name: REST APIs
      - name: Relativity Apps
      - name: Aero UI
      - name: aiR (analytics / AI)
