specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: RelativityOne
providerId: relativityone
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - eDiscovery
  - Legal
description: FinOps shape for RelativityOne. Customers pay a tenant subscription plus matter-driven
  consumption (data ingested, processed, hosted, reviewed). Public per-unit prices are not published;
  the meters listed correspond to the categories Relativity invoices use, not to fabricated request-rate
  meters.
sources:
  - https://www.relativity.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Relativity ODA LLC
serviceCategory: eDiscovery
billingModel:
  pricingCategory: Contact Sales
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
focusColumns:
  ServiceName: RelativityOne
  ServiceCategory: eDiscovery
  ProviderName: Relativity
  PublisherName: Relativity ODA LLC
  InvoiceIssuerName: Relativity ODA LLC
  BillingCurrency: USD
meters:
  - name: data_hosted
    unit: GB-month
    aggregation: sum
    dimensions:
      - matter
      - workspace
  - name: data_processed
    unit: GB
    aggregation: sum
    dimensions:
      - matter
      - workspace
  - name: review_users
    unit: seat
    aggregation: sum
    dimensions:
      - role
principles:
  - name: Visibility
    description: Visibility comes from the Relativity invoice and tenant usage reports, broken down by
      workspace and matter; surface those reports to legal-ops and finance.
  - name: Allocation
    description: Allocate hosted / processed GB and reviewer seats to the matter and the legal team
      that owns the matter; matter is the primary cost-allocation key.
  - name: Optimization
    description: Optimization levers are matter lifecycle (close out completed matters, reduce hosted
      volume), early case assessment, and use of analytics / aiR to cut review hours.
  - name: Accountability
    description: Owner is legal operations / litigation support, who manages the Relativity tenant and
      assigns matter budgets to case teams.
notes: Subscription + matter-consumption model; meters reflect Relativity's invoice categories. Generic
  per-request meters and FOCUS per-call columns removed.
maintainers:
