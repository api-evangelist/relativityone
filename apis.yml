          https://raw.githubusercontent.com/api-evangelist/relativityone/refs/heads/main/json-schema/relativityone-custodian-schema.json
      - type: JSONStructure
        url: >-
          https://raw.githubusercontent.com/api-evangelist/relativityone/refs/heads/main/json-structure/relativityone-legal-hold-structure.json
  - aid: relativityone:object-manager-api
    name: Object Manager API
    description: >-
      The Object Manager API provides CRUD operations for documents and Relativity Dynamic Objects (RDOs). It supports
      bulk read, create, update, and delete operations with filtering and search capabilities across workspace objects.
    humanURL: https://platform.relativity.com/RelativityOne/Content/Relativity_Platform/index.htm
    baseURL: https://relativity.rest/api
    tags:
      - Document Management
      - Object Management
      - CRUD Operations
      - Workspace
    properties:
      - type: Documentation
        url: https://platform.relativity.com/RelativityOne/Content/Relativity_Platform/index.htm
  - aid: relativityone:workspace-manager-api
    name: Workspace Manager API
    description: >-
      The Workspace Manager API provides CRUD operations for Relativity workspaces, including workspace creation,
      configuration, application installation, and environment management.
    humanURL: https://platform.relativity.com/RelativityOne/Content/Relativity_Platform/index.htm
    baseURL: https://relativity.rest/api
    tags:
      - Workspace Management
      - Administration
      - Configuration
    properties:
      - type: Documentation
        url: https://platform.relativity.com/RelativityOne/Content/Relativity_Platform/index.htm
  - aid: relativityone:search-analytics-api
    name: Search and Analytics API
    description: >-
      APIs for search and analytics operations in RelativityOne including dtSearch index management, keyword search,
      Analytics Conceptual Index for LSI and concept discovery, and Pivot queries for data analysis.
    humanURL: https://platform.relativity.com/RelativityOne/Content/Relativity_Platform/index.htm
    baseURL: https://relativity.rest/api
    tags:
      - Search
      - Analytics
      - Full Text Search
      - Concept Search
      - Data Analysis
    properties:
      - type: Documentation
        url: https://platform.relativity.com/RelativityOne/Content/Relativity_Platform/index.htm
  - aid: relativityone:user-permission-manager-api
    name: User and Permission Manager API
    description: >-
      APIs for identity and access management in RelativityOne. Includes user CRUD operations, permission assignment and
      management, group administration, and client management.
    humanURL: https://platform.relativity.com/RelativityOne/Content/Relativity_Platform/index.htm
    baseURL: https://relativity.rest/api
    tags:
      - Identity
      - Access Management
      - Permissions
      - User Management
    properties:
      - type: Documentation
        url: https://platform.relativity.com/RelativityOne/Content/Relativity_Platform/index.htm
  - aid: relativityone:import-export-api
    name: Import and Export API
    description: >-
      Import and Export Services API for handling document and Relativity Dynamic Object (RDO) transfers, including bulk
      import operations for large data sets.
    humanURL: https://platform.relativity.com/RelativityOne/Content/Relativity_Platform/index.htm
    baseURL: https://relativity.rest/api
    tags:
      - Import
      - Export
      - Data Transfer
      - Bulk Operations
    properties:
      - type: Documentation
        url: https://platform.relativity.com/RelativityOne/Content/Relativity_Platform/index.htm
