aid: relativityone
name: RelativityOne
description: >-
  RelativityOne is a cloud-based eDiscovery and legal technology platform that provides comprehensive REST APIs for
  legal hold management, document processing, search and analytics, workspace management, identity and access control,
  and billing insights. The platform integrates with Microsoft 365 and Google Workspace for data preservation and legal
  hold workflows.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - eDiscovery
  - Legal
  - Legal Hold
  - Document Management
  - Compliance
  - Litigation
url: https://raw.githubusercontent.com/api-evangelist/relativityone/refs/heads/main/apis.yml
created: '2025-03-01'
modified: '2026-05-19'
specificationVersion: '0.19'
apis:
  - aid: relativityone:legal-hold-api
    name: Legal Hold API
    description: >-
      The Legal Hold API enables matter and project management integration with external systems like matter management
      platforms and HR systems. It provides endpoints for custodian management, preservation workflows, task tracking,
      entity management, and communication configuration. Authentication is handled via Microsoft Graph API.
    humanURL: https://platform.relativity.com/RelativityOne/Content/Legal_Hold_API/Legal_Hold_API.htm
    baseURL: https://relativity.rest/api
    tags:
      - Legal Hold
      - Custodian Management
      - Preservation
      - eDiscovery
      - Compliance
    properties:
      - type: Documentation
        url: https://platform.relativity.com/RelativityOne/Content/Legal_Hold_API/Legal_Hold_API.htm
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/relativityone/refs/heads/main/openapi/relativityone-legal-hold-openapi.yml
      - type: JSONSchema
